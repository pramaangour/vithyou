const getYoubotResponse = (messages, context) => {
  const lastUserMsg = [...messages].reverse().find(m => m.role === "user" && !m.hidden);
  const q = (lastUserMsg?.content || "").toLowerCase();
  const isFirst = messages.filter(m => m.role === "user" && !m.hidden).length <= 1;

  // Pick response pool based on keywords
  let pool;
  if (context === "bloodwork" && isFirst) {
    pool = youbotResponses.bloodwork;
  } else if (/\b(hi|hello|hey|howdy|greetings|sup|what can you)\b/.test(q) && isFirst) {
    pool = youbotResponses.greetings;
  } else if (/blood.?work|blood.?panel|wbc|cbc|neutrophil|lymphocyte|crp|lab.?result|lab.?test|marker/.test(q)) {
    pool = youbotResponses.bloodwork;
  } else if (/\ball\s+med|my\s+med|what.*med|medication.*for|list.*med/.test(q)) {
    pool = youbotResponses.medications;
  } else if (/metformin|diabetes|blood.?sugar|glucose|hba1c|insulin/.test(q)) {
    pool = youbotResponses.metformin;
  } else if (/lisinopril|ace.?inhibit|blood.?pressure|hypertension|bp/.test(q)) {
    pool = youbotResponses.lisinopril;
  } else if (/atorvastatin|statin|cholesterol|ldl|lipid|lipitor/.test(q)) {
    pool = youbotResponses.cholesterol;
  } else if (/lower.*pressure|reduce.*pressure|pressure.*natural|sodium|salt/.test(q)) {
    pool = youbotResponses.bloodpressure;
  } else if (/sleep|insomnia|tired|fatigue|rest|bedtime/.test(q)) {
    pool = youbotResponses.sleep;
  } else if (/exercise|workout|cardio|walking|fitness|zone.?2|strength|gym/.test(q)) {
    pool = youbotResponses.exercise;
  } else if (/vitamin.?d|d3|cholecalciferol|sunshine|bone/.test(q)) {
    pool = youbotResponses.vitamind;
  } else if (/diet|eat|food|nutrition|fiber|psyllium|mediterranean|gut/.test(q)) {
    pool = youbotResponses.diet;
  } else if (/stress|anxiety|mental|mindful|meditat|cortisol|worry/.test(q)) {
    pool = youbotResponses.stress;
  } else if (/doctor|appointment|ask.*dr|chen|visit|bring up|question/.test(q)) {
    pool = youbotResponses.appointment;
  } else {
    pool = youbotResponses.default;
  }

  // Pick semi-randomly but cycle through pool entries
  const idx = Math.floor(Math.random() * pool.length);
  return pool[idx];
};

const callAI = (messages, context) => {
  return new Promise((resolve) => {
    // Realistic thinking delay: 600ms–1400ms
    const delay = 600 + Math.random() * 800;
    setTimeout(() => {
      resolve(getYoubotResponse(messages, context));
    }, delay);
  });
};

}

        {screen === "ai" && <YoubotHubScreen navigate={navigate} />}
        {screen === "youbot-chat" && <YoubotChatScreen navigate={navigate} data={screenData} />}
        {screen === "records" && <RecordsScreen navigate={navigate} />}
        {screen === "blood-report" && <BloodReportScreen navigate={navigate} data={screenData} />}
        {screen === "pharmacy" && <PharmacyScreen navigate={navigate} />}
        {screen === "med-facts" && <MedFactsScreen navigate={navigate} data={screenData} />}
        {screen === "appointments" && <AppointmentsScreen navigate={navigate} />}
        {screen === "appt-detail" && <ApptDetailScreen navigate={navigate} data={screenData} />}
        {screen === "schedule" && <ScheduleScreen navigate={navigate} data={screenData} />}
        {screen === "explore" && <ExploreScreen navigate={navigate} />}
      </div>

      {/* Bottom Nav */}
      <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: t.bgAlt, borderTop: `1px solid ${t.cardBorder}`, display: "flex", padding: "8px 0 14px", zIndex: 100, boxShadow: "0 -1px 8px rgba(0,0,0,0.05)" }}>
        {navTabs.map(tb => {
          const active = tab === tb.id;
          return (
            <div key={tb.id} onClick={() => navigate(tb.screen)}
              style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, cursor: "pointer", padding: "4px 0" }}>
              <div style={{ width: 32, height: 32, borderRadius: 10, background: active ? t.accentSoft : "transparent", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}>
                <Icon name={tb.icon} size={18} color={active ? t.accent : t.textDim} />
              </div>
              <span style={{ fontSize: 10, fontWeight: active ? 700 : 500, color: active ? t.accent : t.textDim, letterSpacing: "0.2px" }}>{tb.label}</span>

        })}
      </div>
