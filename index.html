<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VithYou — Healthcare, Always With You</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }
    body {
      background: #e6e1f5;
      font-family: 'Plus Jakarta Sans', sans-serif;
      display: flex;
      justify-content: center;
      color: #1a1530;
    }
    #root {
      width: 100%;
      max-width: 430px;
      position: relative;
      /* NO overflow:hidden — that breaks mobile scroll */
    }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-tap-highlight-color: transparent; scrollbar-width: none; }
    input, button, textarea { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* The signature Vithyou aurora gradient — lilac → peach → pink → mint */
    .aurora-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, #d9cff5 0%, transparent 55%),
        radial-gradient(ellipse 70% 50% at 100% 20%, #cfe0f5 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 55%, #f5d4dc 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 10% 75%, #e8dcf5 0%, transparent 55%),
        radial-gradient(ellipse 80% 45% at 60% 95%, #dceadc 0%, transparent 60%),
        linear-gradient(180deg, #e9dff5 0%, #f3e4e8 50%, #e4ecdf 100%);
      z-index: 0;
      pointer-events: none;
    }

    @keyframes pulse-dot { 0%,100%{transform:scale(0.8);opacity:0.5} 50%{transform:scale(1);opacity:1} }
    @keyframes slide-up { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slide-up 0.35s ease-out; }

    /* Fraunces display utility */
    .serif { font-family: 'Fraunces', serif; font-weight: 600; letter-spacing: -0.01em; }
    .serif-it { font-family: 'Fraunces', serif; font-style: italic; font-weight: 500; }

    @media (max-width: 430px) { #root { box-shadow: none; } }
  </style>
</head>

    // ═══════════════════════════════════════════════════════
    // DATA
    // ═══════════════════════════════════════════════════════
    const USER = {
      name: "Priya",
      location: "Bandra West, Mumbai",
      avatar: "P",
      metabolicActive: true, // flip to false to see pre-subscribe state

    const VITALS = [

      { label: "Temp", value: "98.4°" },

    const ACTIVE_PROGRAM = {

    const coachReply = (q) => {

      if (/nausea|sick|vomit|queasy/.test(s)) return "Mild nausea is the most common GLP-1 side effect — about 1 in 5 people feel it in the first few weeks. Try smaller, more frequent meals, stay hydrated, and avoid greasy or heavy food in the evening. If it's persistent or severe, I'll flag Dr. Nair to review your dose before the next escalation.";

    // ═══════════════════════════════════════════════════════
    // SHELL COMPONENTS
    // ═══════════════════════════════════════════════════════

    // The VithYou wordmark — matches mockup: "vith" Fraunces italic + "You" Fraunces italic colored
    const VithYouMark = ({ size = 22, pill = true }) => (
      <span style={{
        display: "inline-flex", alignItems: "center", gap: 4,
        ...(pill ? { background: "rgba(255,255,255,0.75)", padding: "4px 12px", borderRadius: 100 } : {}),
      }}>

    // Fake iOS status bar (9:41 · signal · battery)
    const StatusBar = ({ light = false }) => (
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "12px 22px 6px", fontSize: 13, fontWeight: 600,

      }}>
        <span>9:41</span>
        <span style={{ display: "flex", gap: 4, fontSize: 11, alignItems: "center" }}>
          <span>•ıl</span><span>🔋</span>
        </span>
      </div>
    );

    // Top-of-screen header with back button — for sub-pages
    const PageHeader = ({ title, onBack, right, centered = true }) => (
      <div style={{ display: "flex", alignItems: "center", padding: "6px 18px 14px", position: "relative" }}>
        {onBack && (
          <button onClick={onBack} style={{
            width: 36, height: 36, borderRadius: 100, border: "none",
            background: "rgba(255,255,255,0.85)", boxShadow: SH, cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
            position: "relative", zIndex: 2, flexShrink: 0,
            WebkitAppearance: "none", touchAction: "manipulation",
          }}>
            <Icon name="chevL" size={16} color={v.ink} />

        <div style={{
          flex: 1, textAlign: centered ? "center" : "left",
          marginLeft: centered && onBack ? -36 : 0,
          display: "flex", alignItems: "center", justifyContent: centered ? "center" : "flex-start", gap: 6,

    function MetabolicEligibilityScreen({ navigate, goBack }) {
      const questions = [
        { q: "What's your primary goal?", opts: ["Weight loss", "Better blood sugar control", "Both"] },
        { q: "What's your current BMI range?", opts: ["Under 27", "27 – 30", "30 – 35", "Above 35"] },

        { q: "Have you tried GLP-1 before?", opts: ["Never", "Yes, currently", "Yes, previously"] },
      ];
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState([]);

      const pick = (opt) => {
        const next = [...answers, opt];
        setAnswers(next);
        if (step + 1 >= questions.length) {
          setTimeout(() => navigate("metabolic-checkout", { answers: next }), 400);
        } else {
          setStep(step + 1);
        }
      };

      return (
        <div style={{ paddingBottom: 110, position: "relative", zIndex: 1, minHeight: "100vh" }}>
          <StatusBar />
          <PageHeader title="Eligibility Check" onBack={goBack} />

          <StepIndicator
            steps={questions.map((_, i) => `${i + 1}`)}
            current={step}
          />

          <div style={{ padding: "0 22px", textAlign: "center", marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "1.5px", color: v.inkMuted, marginBottom: 8 }}>
              QUESTION {step + 1} OF {questions.length}

            <div style={{ fontFamily: "'Fraunces', serif", fontWeight: 600, fontSize: 24, color: v.ink, letterSpacing: "-0.02em", lineHeight: 1.2 }}>
              {questions[step].q}
            </div>
          </div>

          <div style={{ padding: "0 20px", display: "flex", flexDirection: "column", gap: 10 }} className="slide-up" key={step}>
            {questions[step].opts.map(opt => (
              <button key={opt} onClick={() => pick(opt)} style={{
                ...Card({ padding: "16px 18px", cursor: "pointer" }),
                background: "rgba(255,255,255,0.8)",
                border: `1.5px solid ${v.border}`,
                textAlign: "left",
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                transition: "all 0.15s",
              }}
                onMouseEnter={e => { e.currentTarget.style.background = v.purpleSoft; e.currentTarget.style.borderColor = v.purple; }}

                <span style={{ fontSize: 14, fontWeight: 500, color: v.ink }}>{opt}</span>
                <Icon name="chevR" size={16} color={v.inkMuted} />

            </div>

        </div>
      );

    // ═══════════════════════════════════════════════════════
    // APP ROOT & ROUTER
    // ═══════════════════════════════════════════════════════
    function App() {
      const [screen, setScreen] = useState("home");
      const [screenData, setScreenData] = useState(null);
      const [history, setHistory] = useState([]);
      const [tab, setTab] = useState("home");

      const mainTabs = ["home", "search", "services", "profile"];

      // Reset scroll to top whenever the screen changes
      useEffect(() => {
        window.scrollTo({ top: 0, left: 0, behavior: "instant" });
      }, [screen]);

      const navigate = (s, data = null) => {
        setHistory(h => [...h, { screen, screenData }]);
        setScreen(s);
        setScreenData(data);
        if (mainTabs.includes(s)) setTab(s);
      };

      const goBack = () => {
        if (!history.length) {
          setScreen("home");
          setTab("home");
          return;
        }
        const prev = history[history.length - 1];
        setHistory(h => h.slice(0, -1));
        setScreen(prev.screen);
        setScreenData(prev.screenData);
        if (mainTabs.includes(prev.screen)) setTab(prev.screen);
      };

      const onTabChange = (t) => {
        setHistory([]);
        setScreen(t);
        setScreenData(null);
        setTab(t);
      };

      const isChatScreen = screen === "metabolic-coach";

      return (
        <div style={{ position: "relative", minHeight: "100vh", width: "100%", maxWidth: 430, margin: "0 auto" }}>
          {/* Aurora pastel background — always present */}
          <div className="aurora-bg" />

          <div style={{ position: "relative", zIndex: 1 }}>
            {screen === "home" && <HomeScreen navigate={navigate} />}
            {screen === "search" && <SearchScreen navigate={navigate} />}
            {screen === "services" && <ServicesScreen navigate={navigate} />}
            {screen === "profile" && <ProfileScreen navigate={navigate} />}
            {screen === "notifications" && <NotificationsScreen navigate={navigate} goBack={goBack} />}
            {screen === "plans" && <PlansScreen navigate={navigate} goBack={goBack} />}
            {screen === "plans-checkout" && <PlansCheckoutScreen navigate={navigate} goBack={goBack} data={screenData} />}
            {screen === "metabolic" && <MetabolicLandingScreen navigate={navigate} goBack={goBack} />}
            {screen === "metabolic-eligibility" && <MetabolicEligibilityScreen navigate={navigate} goBack={goBack} />}
            {screen === "metabolic-checkout" && <MetabolicCheckoutScreen navigate={navigate} goBack={goBack} />}
            {screen === "metabolic-dashboard" && <MetabolicDashboardScreen navigate={navigate} goBack={goBack} />}
            {screen === "metabolic-coach" && <MetabolicCoachScreen goBack={goBack} />}
            {screen === "pharmacy-catalog" && <PharmacyCatalogScreen navigate={navigate} goBack={goBack} />}
            {screen === "lab-catalog" && <LabCatalogScreen navigate={navigate} goBack={goBack} />}
            {screen === "service-details" && <ServiceDetailsScreen navigate={navigate} goBack={goBack} data={screenData} />}
            {screen === "service-tier" && <ServiceTierScreen navigate={navigate} goBack={goBack} data={screenData} />}
            {screen === "service-match" && <ServiceMatchScreen navigate={navigate} goBack={goBack} data={screenData} />}
            {screen === "service-confirm" && <ServiceConfirmScreen navigate={navigate} goBack={goBack} data={screenData} />}
            {screen === "service-profile" && <ServiceProfileScreen navigate={navigate} goBack={goBack} data={screenData} />}
            {screen === "service-track" && <ServiceTrackScreen navigate={navigate} goBack={goBack} data={screenData} />}
            {screen === "service-done" && <ServiceDoneScreen navigate={navigate} data={screenData} />}
          </div>

          {!isChatScreen && <BottomNav tab={tab} onChange={onTabChange} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
